<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visitor Registration - VMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.4/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg-light: #f4f8ff;
            --card-bg: #ffffff;
            --primary: #2962ff;
            --card-border: rgba(41, 98, 255, 0.12);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-light) 0%, #e8f1ff 100%);
            color: #273049;
        }

        .registration-container {
            max-width: 900px;
            margin: 3rem auto;
        }

        .registration-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            box-shadow: 0 15px 40px rgba(31, 41, 55, 0.08);
        }

        .header-section {
            background: linear-gradient(135deg, #1c5ed6 0%, #0c4a9d 100%);
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 2rem;
            color: #ffffff;
        }

        .header-section .icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .form-section {
            padding: 2.5rem;
        }

        .form-group-wrapper {
            margin-bottom: 2rem;
        }

        .form-control,
        .form-select {
            border: 1px solid var(--card-border);
            border-radius: 0.875rem;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(41, 98, 255, 0.15);
        }

        .form-label {
            font-weight: 600;
            color: #273049;
            margin-bottom: 0.5rem;
        }

        .required-mark {
            color: #dc3545;
        }

        .input-group-text {
            background: transparent;
            border: 1px solid var(--card-border);
            border-right: none;
            color: var(--primary);
        }

        .input-group .form-control {
            border-left: none;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 0.875rem;
            padding: 2rem;
            text-align: center;
            background: rgba(41, 98, 255, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: rgba(41, 98, 255, 0.08);
            border-color: #1c5ed6;
        }

        .upload-area i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .upload-area-label {
            color: var(--primary);
            font-weight: 600;
        }

        .upload-area-hint {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--card-border);
        }

        .btn-submit {
            background: linear-gradient(135deg, #2962ff 0%, #1c5ed6 100%);
            border: none;
            color: #ffffff;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 0.875rem;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #1c5ed6 0%, #0c4a9d 100%);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(41, 98, 255, 0.3);
        }

        .btn-reset {
            background: #e9ecef;
            border: none;
            color: #495057;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 0.875rem;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #dee2e6;
            color: #212529;
        }

        .form-text {
            color: #6b7280;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .registration-container {
                margin: 1.5rem auto;
            }

            .form-section {
                padding: 1.5rem;
            }

            .header-section {
                padding: 1.5rem;
            }

            .button-group {
                flex-direction: column;
                justify-content: stretch;
            }

            .button-group button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="registration-container">
        <div class="registration-card">
            <div class="header-section">
                <div class="icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="h3 mb-2">Visitor Registration</h1>
                <p class="mb-0">Please fill in your details to complete the registration process</p>
            </div>

            <div class="form-section">
                <form id="visitorForm" novalidate>
                    <!-- Row 1: Full Name and Mobile Number -->
                    <div class="form-row">
                        <div class="form-group-wrapper">
                            <label for="fullName" class="form-label">Full Name <span
                                    class="required-mark">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="fullName" placeholder="Enter your full name"
                                    required>
                            </div>
                        </div>
                        <div class="form-group-wrapper">
                            <label for="mobileNumber" class="form-label">Mobile Number <span
                                    class="required-mark">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="tel" class="form-control" id="mobileNumber"
                                    placeholder="Enter your mobile number" required>
                            </div>
                        </div>
                    </div>

                    <!-- Row 2: Email and Company Name -->
                    <div class="form-row">
                        <div class="form-group-wrapper">
                            <label for="email" class="form-label">Email Address <span
                                    class="required-mark">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email"
                                    placeholder="Enter your email address" required>
                            </div>
                        </div>
                        <div class="form-group-wrapper">
                            <label for="companyName" class="form-label">Company Name <span
                                    class="required-mark">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-building"></i></span>
                                <input type="text" class="form-control" id="companyName"
                                    placeholder="Enter company name" required>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3: Purpose of Visit -->
                    <div class="form-group-wrapper">
                        <label for="purposeVisit" class="form-label">Purpose of Visit <span
                                class="required-mark">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-clipboard-list"></i></span>
                            <select class="form-select" id="purposeVisit" required>
                                <option value="">Select purpose of visit</option>
                                <option value="business">Business Meeting</option>
                                <option value="interview">Job Interview</option>
                                <option value="delivery">Delivery</option>
                                <option value="consultation">Consultation</option>
                                <option value="maintenance">Maintenance</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 4: Photo Upload -->
                    <div class="form-group-wrapper">
                        <label class="form-label">Upload Photo <span class="required-mark">*</span></label>
                        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
                            <input type="file" id="photoInput" accept="image/*" hidden required>
                            <i class="fas fa-cloud-upload-alt"></i>
                            <div class="upload-area-label">Click to upload photo</div>
                            <div class="upload-area-hint">PNG, JPG or GIF (Max. 5MB)</div>
                        </div>
                        <small class="form-text mt-2">A clear face photo is required for identification</small>
                    </div>

                    <!-- Row 5: ID Proof Upload -->
                    <div class="form-group-wrapper">
                        <label class="form-label">Upload ID Proof <span class="required-mark">*</span></label>
                        <div class="upload-area" onclick="document.getElementById('idProofInput').click()">
                            <input type="file" id="idProofInput" accept=".pdf,.doc,.docx,.jpg,.png" hidden required>
                            <i class="fas fa-file-upload"></i>
                            <div class="upload-area-label">Click to upload ID proof</div>
                            <div class="upload-area-hint">PDF, DOC, JPG or PNG (Max. 10MB)</div>
                        </div>
                        <small class="form-text mt-2">Upload a valid government ID or passport</small>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button type="reset" class="btn btn-reset">
                            <i class="fas fa-redo me-2"></i> Reset
                        </button>
                        <button type="submit" class="btn btn-submit">
                            <i class="fas fa-check-circle me-2"></i> Submit Registration
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script>
        document.getElementById('photoInput').addEventListener('change', function (e) {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                document.querySelector('.upload-area:has(#photoInput) .upload-area-label').textContent = 'Photo: ' + fileName;
            }
        });

        document.getElementById('idProofInput').addEventListener('change', function (e) {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                document.querySelector('.upload-area:has(#idProofInput) .upload-area-label').textContent = 'ID: ' + fileName;
            }
        });

        document.getElementById('visitorForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (this.checkValidity() === false) {
                e.stopPropagation();
            } else {
                alert('Registration submitted successfully!');
            }
            this.classList.add('was-validated');
        });
    </script>
</body>

</html>
