<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visitor Management System Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.4/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      min-height: 100vh;
      background: #eef4fb;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      border: none;
      border-radius: 1rem;
      overflow: hidden;
    }
    .brand-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      font-size: 1.75rem;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
  <div class="card shadow-sm login-card">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="mx-auto mb-3 d-flex align-items-center justify-content-center bg-primary text-white brand-icon">
          <i class="fas fa-id-badge"></i>
        </div>
        <h1 class="h4 mb-1">Visitor Management System</h1>
        <p class="text-muted mb-0">Secure sign in for visitor access and administration.</p>
      </div>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required>
          </div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <a href="#" class="small">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="fas fa-sign-in-alt me-2"></i> Login
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
